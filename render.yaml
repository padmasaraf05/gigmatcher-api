# render.yaml
# Render deployment configuration for GigMatcher FastAPI service.
# Place this file in the ROOT of your gigmatcher-api repo.
#
# How to deploy:
#   1. Push gigmatcher-api/ folder as a separate GitHub repo
#      (or subfolder of a monorepo)
#   2. Go to https://dashboard.render.com → New → Web Service
#   3. Connect your GitHub repo
#   4. Render auto-detects this render.yaml
#   5. Set env vars in Render dashboard:
#        SUPABASE_URL        → your project URL
#        SUPABASE_SERVICE_KEY → service_role key (NOT anon key)

services:
  - type: web
    name: gigmatcher-api
    runtime: python
    plan: free                          # Free tier: 750 hrs/month
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false                     # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false                     # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
